apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-lease-demo
  namespace: default
  labels:
    app: kube-lease-demo
spec:
  replicas: 2                      # two pods, but only one is active at a time
  selector:
    matchLabels:
      app: kube-lease-demo
  template:
    metadata:
      labels:
        app: kube-lease-demo
    spec:
      serviceAccountName: kube-lease-demo   # ties the pod to the RBAC above
      containers:
        - name: worker
          image: YOUR_REGISTRY/kube-lease-demo:1.0   # <-- change this
          imagePullPolicy: IfNotPresent
          env:
            # Each pod gets its own name -> unique holderIdentity in the Lease
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LEASE_NAME
              value: "kube-lease-demo"
            - name: LEASE_NAMESPACE
              value: "default"
            - name: LEASE_DURATION
              value: "15"
            - name: RENEW_DEADLINE
              value: "10"
            - name: RETRY_PERIOD
              value: "2"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
