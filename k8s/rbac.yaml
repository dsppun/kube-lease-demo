# Without this, the pod gets "403 Forbidden" the moment it touches a Lease.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lease-worker
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lease-worker
  namespace: default
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lease-worker
  namespace: default
subjects:
  - kind: ServiceAccount
    name: lease-worker
    namespace: default
roleRef:
  kind: Role
  name: lease-worker
  apiGroup: rbac.authorization.k8s.io
